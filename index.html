<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Копирование шаблонов Django</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .btn { width: 100%; max-width: 420px; margin: 10px 0; padding: 15px; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8 text-center">

                <h2 class="mb-5">Копирование шаблонов Django</h2>

                <div class="d-grid gap-3 col-10 mx-auto">
                    <button onclick="copyIndex()" class="btn btn-primary btn-lg">Копировать index.html</button>
                    <button onclick="copyLogin()" class="btn btn-success btn-lg">Копировать login.html</button>
                    <button onclick="copySignup()" class="btn btn-warning btn-lg">Копировать signup.html</button>
                    <button onclick="copyView()" class="btn btn-danger btn-lg">Копировать app1/views.py </button>
                    <button onclick="copyBase()" class="btn btn-info btn-lg">Копировать body base.html </button>
                </div>

                <div id="message" class="mt-4 fw-bold fs-5" style="min-height: 40px;"></div>

            </div>
        </div>
    </div>

    <script>
    // ==================== index.html ====================
    const indexCode = `{% extends 'base.html' %}

{% load static %}
{% block title %} Главная страница {% endblock %}
{% block body %}
  <div class="center">
      <h1 class="text-center h1">Добро пожаловать на главную страницу сервиса техподдержки HelpDesk</h1>
      <p class="text-center display-5">На данном ресурсе вы можете составить заявку на помощь</p>
      Здесь карусель!
  </div>
{% endblock %}`;

    // ==================== login.html ====================
    const loginCode = `{% extends 'base.html' %}

{% block title %} Вход {% endblock %}
{% block body %}
  <div class="text-center mb-3">
      <form method="POST">
          {% csrf_token %}
          <div class="mb-3">
              <p class="text-center fs-4">Логин</p>
              <input type="text" class="form-control" id="username" name="username" placeholder="Введите логин" required>
              <div class="form-text">Введите логин</div>
          </div>
          <div class="mb-3">
              <p class="text-center fs-4">Пароль</p>
              <input type="password" class="form-control" id="password" name="password" placeholder="Введите пароль" minlength="6" required>
              <div class="form-text">Введите пароль</div>
          </div>

          {% if messages %}
              {% for message in messages %}
                  <div class="alert alert-danger" role="alert">{{ message }}</div>
              {% endfor %}
          {% endif %}

          <button type="submit" class="btn btn-success">Войти</button>
          <a class="nav-link d-inline-block mt-3" href="{% url 'signup' %}">Еще нет аккаунта? Регистрация</a>
      </form>
  </div>
{% endblock %}`;

    // ==================== signup.html ====================
    const signupCode = `{% extends 'base.html' %}

{% load static %}
{% block title %} Регистрация {% endblock %}
{% block body %}
  <div class="center">
      <div class="text-center mb-3">
          <form method="POST">
              {% csrf_token %}
              <div class="mb-3">
                  <p class="text-center fs-4">Почта</p>
                  <input type="email" class="form-control" id="email" name="email" placeholder="Введите почту" required>
                  <div class="form-text">Введите почту</div>
              </div>
              <div class="mb-3">
                  <p class="text-center fs-4">Логин</p>
                  <input type="text" class="form-control" id="username" name="username" placeholder="Введите логин" required>
                  <div class="form-text">Введите логин</div>
              </div>
              <div class="mb-3">
                  <p class="text-center fs-4">ФИО</p>
                  <input type="text" class="form-control" id="first_name" name="first_name" placeholder="Введите ФИО" required>
                  <div class="form-text">Введите ФИО</div>
              </div>
              <div class="mb-3">
                  <p class="text-center fs-4">Телефон</p>
                  <input type="tel" class="form-control" id="phone" name="phone" placeholder="+7(XXX)-XXX-XX-XX" required>
                  <div class="form-text">Введите номер телефона</div>
              </div>
              <div class="mb-3">
                  <p class="text-center fs-4">Пароль</p>
                  <input type="password" class="form-control" id="password" name="password" placeholder="Введите пароль" minlength="6" required>
                  <div class="form-text">Латыница, числа и спецсимволы, не менее 6 символов</div>
              </div>
              <div class="mb-3">
                  <p class="text-center fs-4">Повторите пароль</p>
                  <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Повторите пароль" required>
                  <div class="form-text">Введите пароль повторно</div>
              </div>

              {% if messages %}
                  {% for message in messages %}
                      <div class="alert alert-danger" role="alert">{{ message }}</div>
                  {% endfor %}
              {% endif %}

              <button type="submit" class="btn btn-success">Зарегистрироваться</button>
              <a class="nav-link d-inline-block mt-3" href="{% url 'login' %}">Уже зарегистрированы? Вход</a>
          </form>
      </div>
  </div>
{% endblock %}`;

const viewcode = `
from django.shortcuts import render, redirect
from .models import *
from django.contrib.auth.models import User 
from django.contrib.auth import login, logout, authenticate
from django.contrib.auth.decorators import login_required
from django.contrib import messages
def signup(request):
    if request.user.is_authenticated:
        return redirect('/')
    if request.method == 'POST':
        username = request.POST['username']
        email = request.POST['email']
        first_name = request.POST['first_name']
        password = request.POST['password']
        confirm_password = request.POST['confirm_password']
        if password != confirm_password:
            messages.error(request, 'Пароли не совпадают')
            return redirect('signup')
        if User.objects.filter(username=username).exists():
            messages.error(request, 'Логин уже занят')
            return redirect('signup')
        phone = request.POST['phone']
        user = User.objects.create_user(username, email, password)
        user.first_name = first_name
        user.save()
        profile = Employee.objects.create(user=user, phone=phone)
        profile.save()
        return redirect('/login')
    return render(request, 'signup.html')
def login_auth(request):
    if request.user.is_authenticated:
        return redirect('/')
    if request.method == 'POST':
        username = request.POST['username']
        password = request.POST['password']
        user = authenticate(username=username, password=password)
        if user is not None:
            login(request, user)
            return redirect('/')
        else:
            messages.error(request, 'Неправильный логин или пароль')
            return render(request, 'login.html')
    return render(request, 'login.html')

def logout_auth(request):
    logout(request)
    return redirect('/')
def index(request):
    return render(request, 'index.html')
`
const baseCode = 
`<header>
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
          <div class="container-fluid">
            <a class="navbar-brand" href="/"><img src="{% static 'media/img/2.jpg'%}" width="50" alt=""></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
              <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
              <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                  <a class="nav-link active" aria-current="page" href="/">Главная страница</a>
                </li>
                  {% if user.is_authenticated%}
                <li class="nav-item">
                  <a class="nav-link" href="#">Добро пожаловать, {{request.user}}</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="{% url 'logout'%}" tabindex="-1" aria-disabled="true">Выход</a>
                </li>
                  {% else %}
                  <li class="nav-item">
                    <a class="nav-link" href="{% url 'signup' %}" tabindex="-1" aria-disabled="true">Регистрация</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link" href="{% url 'login' %}" tabindex="-1" aria-disabled="true">Вход</a>
                  </li>
                  {% endif %}
                  {% if user.is_superuser %}
                  <li class="nav-item">
                    <a class="nav-link" href="/admin" tabindex="-1" aria-disabled="true">Админ панель</a>
                  </li>
                  {% endif %}
              </ul>
            </div>
          </div>
        </nav>
    </header>
    <main>
        {% block body %} {% endblock %}
    </main>
`
    function copyCode(name, code) {
        const textarea = document.createElement("textarea");
        textarea.value = code;
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        textarea.style.top = "-9999px";
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();

        try {
            document.execCommand("copy");
            showMessage("✅ " + name + " успешно скопирован!");
        } catch (err) {
            showMessage("❌ Не удалось скопировать " + name, true);
        }

        document.body.removeChild(textarea);
    }

    function copyIndex()  { copyCode("index.html", indexCode); }
    function copyLogin()  { copyCode("login.html", loginCode); }
    function copySignup() { copyCode("signup.html", signupCode); }
    function copyView()   { copyCode("app1/views.py", viewcode); }
    function copyBase()   { copyCode("base.html", baseCode); }

    function showMessage(text, isError = false) {
        const msg = document.getElementById("message");
        msg.textContent = text;
        msg.style.color = isError ? "#dc3545" : "#28a745";
        
        setTimeout(() => msg.textContent = "", 4000);
    }
    </script>
</body>
</html>
